name: Update PWS Data

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 minutes
  workflow_dispatch:         # lets you run it manually too

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install requests

    - name: Fetch WU data
      env:
        WU_API_KEY: ${{ secrets.WU_API_KEY }}
        WU_STATION_ID: ${{ secrets.WU_STATION_ID }}
      run: |
        python - <<EOF
        import requests
        import json
        from datetime import datetime

        url = f"https://api.weather.com/v2/pws/observations/current?stationId=${{ env.WU_STATION_ID }}&format=json&units=e&apiKey=${{ env.WU_API_KEY }}"

        response = requests.get(url)
        print("API Status Code:", response.status_code)
        print("API Raw Response:", response.text)

        try:
            data = response.json()
            print("Parsed JSON keys:", list(data.keys()))

            if 'observations' in data and data['observations']:
                obs = data['observations'][0]
                print("Observation keys:", list(obs.keys()))
            else:
                print("No observations in response")
        except Exception as e:
            print("JSON parse error:", str(e))
        EOF

    - name: Commit changes
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add current-pws.md
        git commit -m "Update current PWS data (forced)" --allow-empty || echo "Commit forced or skipped"
        git push
